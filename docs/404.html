<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verrio · Not found</title>
    <meta name="description" content="The requested Verrio page could not be found." />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap");

      :root {
        color-scheme: light;
        --bg: #f2ece2;
        --panel: rgba(252, 249, 242, 0.84);
        --panel-strong: rgba(255, 252, 247, 0.96);
        --ink: #1d2725;
        --muted: #64706d;
        --accent: #9a612f;
        --accent-strong: #2f716f;
        --line: rgba(35, 50, 47, 0.12);
        --shadow: 0 24px 60px rgba(33, 40, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 10%, rgba(154, 97, 47, 0.14), transparent 28%),
          radial-gradient(circle at 82% 18%, rgba(47, 113, 111, 0.12), transparent 24%),
          linear-gradient(180deg, #f7f2e9 0%, #f1eadf 45%, #ebe3d6 100%);
        font-family: "Manrope", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .page {
        position: relative;
        width: min(760px, 100%);
        padding: clamp(24px, 5vw, 56px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 42%),
          linear-gradient(90deg, transparent 0 72%, rgba(47, 113, 111, 0.04) 100%);
        pointer-events: none;
      }

      .content {
        position: relative;
        display: grid;
        gap: 20px;
        max-width: 560px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        font-weight: 700;
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          background-color 160ms ease;
      }

      a:hover {
        transform: translateY(-1px);
      }

      .button--primary {
        color: #fffaf3;
        background: var(--accent-strong);
        box-shadow: 0 12px 26px rgba(47, 113, 111, 0.2);
      }

      .button--secondary {
        color: var(--ink);
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.56);
      }

      @media (max-width: 640px) {
        body {
          padding: 14px;
          align-items: start;
        }

        .page {
          border-radius: 22px;
        }

        .actions {
          flex-direction: column;
        }

        a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="Verrio page not found">
      <div class="content">
        <p class="eyebrow">Verrio</p>
        <h1>That page does not exist.</h1>
        <p>
          If you were trying to get to the map workspace, use the maps subdomain.
          If you were trying to reach the main public site, head back to the home page.
        </p>
        <div class="actions">
          <a class="button--primary" href="/">Go home</a>
          <a class="button--secondary" href="https://maps.verrio.co/azenhas/">Open the map workspace</a>
        </div>
      </div>
    </main>
  </body>
</html>
